<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Salary Predictor - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1000px; margin: 2rem auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
    .result-card { background: #f8fafc; padding: 1.5rem; margin-top: 1rem; border-radius: 0.75rem; border-left: 4px solid #10b981; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #e0e7ff; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">💰 AI Salary Predictor</h1>
      <p class="text-gray-600 mt-2">Estimate your market salary for BA roles in Europe — Instant & Free</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline mt-2 inline-block">← Back to Portfolio</a>
    </div>

    <div class="space-y-6 mb-6">
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">💼 Job Title</label>
        <input type="text" id="jobTitle" value="Business Analyst" placeholder="e.g., Business Analyst, Senior BA">
      </div>
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-700">📍 Country</label>
          <select id="country">
            <option value="Luxembourg">🇱 Luxembourg</option>
            <option value="Netherlands">🇳🇱 Netherlands</option>
            <option value="Ireland">🇮🇪 Ireland</option>
            <option value="Germany">🇩 Germany</option>
            <option value="Belgium">🇧🇪 Belgium</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-700">📅 Years of Experience</label>
          <input type="number" id="experience" placeholder="Years" min="0" max="30">
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">📄 Your Resume (Optional - for better accuracy)</label>
        <textarea id="resume" rows="4" placeholder="Paste your resume for personalized prediction..."></textarea>
      </div>
    </div>

    <button id="predictBtn" class="btn">💰 Predict My Salary</button>
    <div id="result" class="hidden"></div>
  </div>

  <script>
    const predictBtn = document.getElementById('predictBtn');
    const resultDiv = document.getElementById('result');

    // Market Data Database (2026 Estimates)
    const salaryData = {
      "Luxembourg": { base: 65000, senior: 95000, lead: 120000 },
      "Netherlands": { base: 55000, senior: 80000, lead: 100000 },
      "Ireland": { base: 52000, senior: 78000, lead: 98000 },
      "Germany": { base: 50000, senior: 75000, lead: 95000 },
      "Belgium": { base: 48000, senior: 70000, lead: 90000 }
    };

    predictBtn.addEventListener('click', () => {
      const jobTitle = document.getElementById('jobTitle').value.trim();
      const country = document.getElementById('country').value;
      const experience = parseInt(document.getElementById('experience').value) || 0;
      const resume = document.getElementById('resume').value.trim();

      if (!jobTitle) { alert('Please enter a job title'); return; }

      predictBtn.disabled = true;
      predictBtn.innerHTML = '<span class="loading"></span> Analyzing Market Data...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<div class="text-center py-8 text-gray-500"><div class="loading"></div> Calculating salary range...</div>';

      setTimeout(() => {
        const data = salaryData[country] || salaryData["Netherlands"];
        let minSalary, maxSalary, level;

        // Determine seniority level
        if (experience >= 8 || (resume.toLowerCase().includes('lead') || resume.toLowerCase().includes('principal'))) {
          minSalary = data.lead * 0.85;
          maxSalary = data.lead * 1.1;
          level = "Lead / Principal";
        } else if (experience >= 4) {
          minSalary = data.senior * 0.85;
          maxSalary = data.senior * 1.1;
          level = "Senior";
        } else {
          minSalary = data.base * 0.85;
          maxSalary = data.base * 1.1;
          level = "Mid-Level";
        }

        // Adjust for specialized skills
        const lowerResume = resume.toLowerCase();
        const factors = [];
        if (lowerResume.includes('guidewire')) { minSalary *= 1.1; maxSalary *= 1.1; factors.push("Guidewire expertise (+10%)"); }
        if (lowerResume.includes('insurance') || lowerResume.includes('claims')) { minSalary *= 1.05; factors.push("Insurance domain knowledge (+5%)"); }
        if (lowerResume.includes('automation') || lowerResume.includes('ai')) { minSalary *= 1.08; factors.push("AI/Automation skills (+8%)"); }
        if (lowerResume.includes('mba')) { minSalary *= 1.05; factors.push("MBA qualification (+5%)"); }

        minSalary = Math.round(minSalary);
        maxSalary = Math.round(maxSalary);

        resultDiv.innerHTML = `
          <div class="text-center mb-6 p-6 bg-gradient-to-b from-green-50 to-white rounded-2xl border border-green-100">
            <div class="text-5xl font-bold text-green-600">€${minSalary.toLocaleString()} - €${maxSalary.toLocaleString()}</div>
            <div class="text-gray-600 mt-2 font-medium">${level} ${jobTitle} in ${country}</div>
          </div>
          
          <div class="result-card">
            <strong class="text-green-700 block mb-2">📊 Factors Affecting This Range</strong>
            <ul class="space-y-1 text-gray-700">
              ${factors.map(f => `<li>• ${f}</li>`).join('') || '<li>• Standard market rate for ${experience} years experience</li>'}
              <li>• Based on 2026 market data for ${country}</li>
              <li>• Adjusted for ${jobTitle} role specificity</li>
            </ul>
          </div>
          
          <div class="result-card">
            <strong class="text-blue-700 block mb-2">💡 Negotiation Tip</strong>
            <p class="text-gray-700">Anchor your negotiation at the upper end (€${maxSalary.toLocaleString()}) by emphasizing your ${factors[0]?.replace(' (+X%)', '') || 'relevant experience'} and quantifiable achievements. Always negotiate based on total compensation, not just base salary.</p>
          </div>
          
          <div class="text-center text-xs text-gray-500 mt-6">💰 Salaries based on market data for ${country} | Updated 2026</div>
        `;

        predictBtn.disabled = false;
        predictBtn.innerHTML = '💰 Predict My Salary';
      }, 1000);
    });
  </script>
</body>
</html>
