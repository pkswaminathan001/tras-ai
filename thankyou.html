<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Thank You Email - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1000px; margin: 2rem auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; transition: border-color 0.2s; }
    input:focus, textarea:focus { outline: none; border-color: #667eea; }
    .result-card { background: #f8fafc; padding: 1.5rem; margin-top: 1rem; border-radius: 0.75rem; border-left: 4px solid #22c55e; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #e0e7ff; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🙏 AI Thank You Email Generator</h1>
      <p class="text-gray-600 mt-2">Send memorable post-interview thank you notes — Instant & Free</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline mt-2 inline-block">← Back to Portfolio</a>
    </div>

    <div class="grid md:grid-cols-2 gap-6 mb-6">
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">👤 Interviewer Name</label>
        <input type="text" id="interviewerName" placeholder="e.g., Michael Chen">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">🏢 Company Name</label>
        <input type="text" id="company" placeholder="e.g., ING Netherlands">
      </div>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-semibold mb-2 text-gray-700">🎯 Position Interviewed For</label>
      <input type="text" id="position" value="Business Analyst" placeholder="Business Analyst">
    </div>

    <div class="mb-6">
      <label class="block text-sm font-semibold mb-2 text-gray-700">💬 Specific Topic Discussed (Optional)</label>
      <textarea id="topics" rows="3" placeholder="e.g., We discussed the Guidewire implementation project and my experience with claims automation..."></textarea>
    </div>

    <button id="generateBtn" class="btn">🙏 Generate Thank You Email</button>
    <div id="result" class="hidden"></div>
  </div>

  <script>
    const generateBtn = document.getElementById('generateBtn');
    const resultDiv = document.getElementById('result');

    generateBtn.addEventListener('click', () => {
      const interviewerName = document.getElementById('interviewerName').value.trim() || 'Interviewer';
      const company = document.getElementById('company').value.trim() || '[Company]';
      const position = document.getElementById('position').value.trim() || 'the position';
      const topics = document.getElementById('topics').value.trim();

      generateBtn.disabled = true;
      generateBtn.innerHTML = '<span class="loading"></span> Writing Thank You Note...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<div class="text-center py-8 text-gray-500"><div class="loading"></div> Crafting your email...</div>';

      setTimeout(() => {
        // Dynamic topic reference
        let topicReference = "";
        if (topics) {
          topicReference = `I particularly enjoyed our discussion about ${topics.substring(0, 150)}${topics.length > 150 ? '...' : ''}, and I am even more excited about the opportunity to contribute to this initiative.`;
        } else {
          topicReference = "Our conversation reinforced my enthusiasm for this role, and I am confident that my background aligns well with your team's needs.";
        }

        const email = `Subject: Thank You - ${position} Interview

Dear ${interviewerName},

Thank you so much for taking the time to interview me today for the ${position} position at ${company}. I truly enjoyed learning more about your team and the exciting projects ahead.

${topicReference}

I remain very enthusiastic about the opportunity to join ${company} and contribute to your continued success. Please don't hesitate to reach out if you need any additional information from my side.

Thank you again for your consideration. I look forward to hearing from you.

Best regards,
[Your Name]
[LinkedIn Profile URL]`;

        resultDiv.innerHTML = `
          <div class="result-card">
            <strong class="text-green-700 block mb-3">🙏 Your Thank You Email</strong>
            <div class="mt-2 p-4 bg-white rounded-lg border whitespace-pre-wrap font-mono text-sm text-gray-800 leading-relaxed">${email}</div>
            <button onclick="copyEmail()" class="mt-4 px-4 py-2 bg-indigo-50 text-indigo-700 rounded-lg text-sm font-medium hover:bg-indigo-100 transition-colors">📋 Copy to Clipboard</button>
          </div>
          <div class="text-center text-xs text-gray-500 mt-6">💡 Send within 24 hours of your interview for best results!</div>
        `;

        window.emailText = email;
        generateBtn.disabled = false;
        generateBtn.innerHTML = '🙏 Generate Thank You Email';
      }, 1000);
    });

    window.copyEmail = () => { 
      navigator.clipboard.writeText(window.emailText).then(() => {
        alert('✅ Copied to clipboard!');
      }).catch(() => {
        alert('❌ Failed to copy. Please select and copy manually.');
      });
    };
  </script>
</body>
</html>
