<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Skill Gap Analyzer - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.21.0/dist/index.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1200px; margin: 2rem auto; }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; }
    .btn:disabled { opacity: 0.5; }
    .result-card { background: #f8fafc; padding: 1rem; margin: 0.75rem 0; border-radius: 0.5rem; }
    .strength { border-left-color: #10b981; border-left-width: 4px; }
    .gap { border-left-color: #ef4444; border-left-width: 4px; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .api-input { background: #fef9c3; border: 1px solid #eab308; }
    .progress-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; background: #10b981; border-radius: 4px; transition: width 0.5s; }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">📊 AI Skill Gap Analyzer</h1>
      <p class="text-gray-600">Compare your skills against job requirements</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline">← Back to Portfolio</a>
    </div>

    <div class="mb-4 p-3 bg-amber-50 rounded-lg border border-amber-200">
      <label class="block text-sm font-semibold mb-1">🔑 Google Gemini API Key</label>
      <input type="password" id="apiKey" class="w-full p-2 border rounded-md api-input">
    </div>

    <div class="grid md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-semibold mb-1">📄 Your Resume/CV</label>
        <textarea id="resume" rows="8" placeholder="Paste your resume here..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">💼 Job Description</label>
        <textarea id="jobdesc" rows="8" placeholder="Paste job description here..."></textarea>
      </div>
    </div>

    <button id="analyzeBtn" class="btn">🔍 Analyze Skill Gap</button>
    <div id="result" class="mt-6 hidden"></div>
  </div>

  <script>
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultDiv = document.getElementById('result');
    const apiKeyInput = document.getElementById('apiKey');

    if (localStorage.getItem('gemini_api_key')) apiKeyInput.value = localStorage.getItem('gemini_api_key');
    apiKeyInput.addEventListener('change', () => { if(apiKeyInput.value.trim()) localStorage.setItem('gemini_api_key', apiKeyInput.value.trim()); });

    analyzeBtn.addEventListener('click', async () => {
      const resume = document.getElementById('resume').value.trim();
      const job = document.getElementById('jobdesc').value.trim();
      const apiKey = apiKeyInput.value.trim();

      if (!resume || !job) { alert('Please paste both resume and job description'); return; }
      if (!apiKey) { alert('Enter your Gemini API key'); return; }

      analyzeBtn.disabled = true;
      analyzeBtn.innerHTML = '<span class="loading"></span> Analyzing Skills...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<div class="text-center py-8"><div class="loading"></div> AI comparing skills...</div>';

      try {
        const { GoogleGenerativeAI } = window;
        const genAI = new GoogleGenerativeAI(apiKey);
        const model = genAI.getGenerativeModel({ model: 'gemini-2.0-flash' });

        const prompt = `Compare skills between resume and job description.
RESUME: ${resume}
JOB: ${job}

Return ONLY JSON:
{
  "matchScore": 75,
  "strengths": ["Skill 1", "Skill 2", "Skill 3"],
  "gaps": ["Missing Skill 1", "Missing Skill 2", "Missing Skill 3"],
  "recommendations": ["Actionable tip 1", "Tip 2", "Tip 3"]
}`;

        const result = await model.generateContent(prompt);
        const response = await result.response;
        let text = response.text().replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
        const data = JSON.parse(text);

        resultDiv.innerHTML = `
          <div class="text-center mb-4">
            <div class="text-5xl font-bold ${data.matchScore >= 70 ? 'text-green-600' : data.matchScore >= 50 ? 'text-yellow-600' : 'text-red-600'}">${data.matchScore}<span class="text-2xl">%</span></div>
            <div class="progress-bar mt-2"><div class="progress-fill" style="width: ${data.matchScore}%"></div></div>
            <p class="text-sm text-gray-600 mt-2">Skill Match Score</p>
          </div>
          <div class="result-card strength"><strong class="text-green-700">✅ Your Strengths (Keep These!)</strong><br>${data.strengths.map(s => `• ${s}`).join('<br>')}</div>
          <div class="result-card gap"><strong class="text-red-700">⚠️ Skill Gaps (Need to Develop)</strong><br>${data.gaps.map(g => `• ${g}`).join('<br>')}</div>
          <div class="result-card"><strong class="text-blue-700">📌 Actionable Recommendations</strong><br>${data.recommendations.map(r => `• ${r}`).join('<br>')}</div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `<div class="result-card bg-red-50"><strong>Error:</strong> ${error.message}</div>`;
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.innerHTML = '🔍 Analyze Skill Gap';
      }
    });
  </script>
</body>
</html>
