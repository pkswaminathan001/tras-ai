<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Skill Gap Analyzer - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1200px; margin: 2rem auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-family: monospace; font-size: 0.85rem; transition: border-color 0.2s; }
    textarea:focus { outline: none; border-color: #667eea; }
    .result-card { background: #f8fafc; padding: 1.5rem; margin-top: 1rem; border-radius: 0.75rem; }
    .strength { border-left: 4px solid #10b981; }
    .gap { border-left: 4px solid #ef4444; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #e0e7ff; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .progress-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; background: #10b981; border-radius: 4px; transition: width 0.5s; }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <!-- SECURITY FIX: Removed exposed API key completely -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">📊 AI Skill Gap Analyzer</h1>
      <p class="text-gray-600 mt-2">Compare your skills against job requirements — Instant & Free</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline mt-2 inline-block">← Back to Portfolio</a>
    </div>

    <div class="grid md:grid-cols-2 gap-6 mb-6">
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">📄 Your Resume/CV</label>
        <textarea id="resume" rows="8" placeholder="Paste your resume here..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">💼 Job Description</label>
        <textarea id="jobdesc" rows="8" placeholder="Paste job description here..."></textarea>
      </div>
    </div>

    <button id="analyzeBtn" class="btn">🔍 Analyze Skill Gap</button>
    <div id="result" class="hidden"></div>
  </div>

  <script>
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultDiv = document.getElementById('result');

    // Comprehensive BA Skill Bank
    const skillBank = [
      "Requirements Gathering", "Stakeholder Management", "Process Mapping", 
      "Agile Methodologies", "Scrum Framework", "User Stories", "Gap Analysis",
      "UAT Testing", "Data Analysis", "SQL", "KPI Tracking", "Workflow Optimization",
      "Business Case Development", "Guidewire", "Insurance Operations",
      "BFSI Domain", "JIRA", "Confluence", "Tableau", "Power BI",
      "Risk Assessment", "Change Management", "Documentation", "Sprint Planning"
    ];

    analyzeBtn.addEventListener('click', () => {
      const resume = document.getElementById('resume').value.trim();
      const job = document.getElementById('jobdesc').value.trim();

      if (!resume || !job) { alert('Please paste both resume and job description'); return; }

      analyzeBtn.disabled = true;
      analyzeBtn.innerHTML = '<span class="loading"></span> Analyzing Skills...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<div class="text-center py-8 text-gray-500"><div class="loading"></div> Comparing skills...</div>';

      setTimeout(() => {
        const resumeLower = resume.toLowerCase();
        const jobLower = job.toLowerCase();
        
        const strengths = [];
        const gaps = [];
        const recommendations = [];

        skillBank.forEach(skill => {
          const skillLower = skill.toLowerCase();
          if (jobLower.includes(skillLower)) {
            if (resumeLower.includes(skillLower)) {
              strengths.push(skill);
            } else {
              gaps.push(skill);
            }
          }
        });

        // Calculate match score
        const totalRequired = strengths.length + gaps.length;
        const matchScore = totalRequired > 0 ? Math.round((strengths.length / totalRequired) * 100) : 0;

        // Generate recommendations
        if (gaps.length > 0) {
          recommendations.push(`Prioritize learning: ${gaps.slice(0, 3).join(', ')}`);
          recommendations.push("Add missing skills to your resume's skills section if you have relevant experience");
          recommendations.push("Consider online courses or certifications for critical gaps");
        } else {
          recommendations.push("Excellent skill alignment! Focus on showcasing quantifiable achievements");
          recommendations.push("Highlight leadership and mentoring experience to stand out");
        }

        const scoreColor = matchScore >= 70 ? 'text-green-600' : matchScore >= 50 ? 'text-yellow-600' : 'text-red-600';

        resultDiv.innerHTML = `
          <div class="text-center mb-6 p-6 bg-gradient-to-b from-indigo-50 to-white rounded-2xl border border-indigo-100">
            <div class="text-5xl font-bold ${scoreColor}">${matchScore}<span class="text-2xl text-gray-400">%</span></div>
            <div class="progress-bar mt-3 max-w-md mx-auto"><div class="progress-fill" style="width: ${matchScore}%"></div></div>
            <p class="text-sm text-gray-600 mt-2 font-medium">Skill Match Score</p>
          </div>
          
          <div class="grid md:grid-cols-2 gap-4">
            <div class="result-card strength">
              <strong class="text-green-700 block mb-2">✅ Your Strengths (Keep These!)</strong>
              <ul class="space-y-1 text-gray-700">
                ${strengths.map(s => `<li>• ${s}</li>`).join('') || '<li>No matching skills detected yet</li>'}
              </ul>
            </div>
            
            <div class="result-card gap">
              <strong class="text-red-700 block mb-2">⚠️ Skill Gaps (Need to Develop)</strong>
              <ul class="space-y-1 text-gray-700">
                ${gaps.map(g => `<li>• ${g}</li>`).join('') || '<li>🎉 No critical gaps detected!</li>'}
              </ul>
            </div>
          </div>
          
          <div class="result-card mt-4">
            <strong class="text-blue-700 block mb-2">📌 Actionable Recommendations</strong>
            <ul class="space-y-2 text-gray-700">
              ${recommendations.map(r => `<li>• ${r}</li>`).join('')}
            </ul>
          </div>
          
          <div class="text-center text-xs text-gray-500 mt-6">💡 Tip: Use this analysis to tailor your resume and upskilling plan!</div>
        `;

        analyzeBtn.disabled = false;
        analyzeBtn.innerHTML = '🔍 Analyze Skill Gap';
      }, 1000);
    });
  </script>
</body>
</html>
