<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Networking Email - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FIX 1: Removed Google Generative AI CDN -->
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1000px; margin: 2rem auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; transition: border-color 0.2s; }
    input:focus, textarea:focus { outline: none; border-color: #667eea; }
    .result-card { background: #f8fafc; padding: 1.5rem; margin-top: 1rem; border-radius: 0.75rem; border-left: 4px solid #3b82f6; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #e0e7ff; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <!-- FIX 2: Removed API Key Input Field Entirely -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">📧 AI Networking Email Generator</h1>
      <p class="text-gray-600 mt-2">Craft cold emails that get responses — Instant & Free</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline mt-2 inline-block">← Back to Portfolio</a>
    </div>

    <div class="grid md:grid-cols-2 gap-6 mb-6">
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">👤 Recipient Name</label>
        <input type="text" id="recipientName" placeholder="e.g., Sarah Johnson">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">🏢 Recipient Role</label>
        <input type="text" id="recipientRole" placeholder="e.g., Senior Recruiter">
      </div>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-semibold mb-2 text-gray-700">🏢 Company Name</label>
      <input type="text" id="company" placeholder="e.g., ING, Rabobank, Deloitte">
    </div>

    <div class="mb-6">
      <label class="block text-sm font-semibold mb-2 text-gray-700">📄 Your Resume/CV (For personalization)</label>
      <textarea id="resume" rows="5" placeholder="Paste your resume here..."></textarea>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-semibold mb-2 text-gray-700">🎯 Position You're Interested In</label>
      <input type="text" id="position" value="Business Analyst" placeholder="Business Analyst">
    </div>

    <button id="generateBtn" class="btn">📧 Generate Networking Email</button>
    <div id="result" class="hidden"></div>
  </div>

  <script>
    const generateBtn = document.getElementById('generateBtn');
    const resultDiv = document.getElementById('result');

    // FIX 3: Replaced Real AI with Rule-Based Simulation
    generateBtn.addEventListener('click', () => {
      const recipientName = document.getElementById('recipientName').value.trim() || 'Hiring Manager';
      const recipientRole = document.getElementById('recipientRole').value.trim() || 'Recruiter';
      const company = document.getElementById('company').value.trim() || '[Company Name]';
      const resume = document.getElementById('resume').value.trim();
      const position = document.getElementById('position').value.trim() || 'Business Analyst';

      // Simulate processing time
      generateBtn.disabled = true;
      generateBtn.innerHTML = '<span class="loading"></span> Writing Email...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<div class="text-center py-8 text-gray-500"><div class="loading"></div> Crafting your email...</div>';

      setTimeout(() => {
        const lowerResume = resume.toLowerCase();
        
        // Detect key attributes for dynamic personalization
        const hasGuidewire = lowerResume.includes('guidewire');
        const hasInsurance = lowerResume.includes('insurance') || lowerResume.includes('claims');
        const hasMba = lowerResume.includes('mba');
        const hasAutomation = lowerResume.includes('automation') || /\d+%/.test(lowerResume);
        
        // Build personalized hook
        let hook = "";
        if (hasGuidewire && hasInsurance) {
          hook = `With hands-on Guidewire experience in insurance operations, I am confident I can add immediate value to your ${company} team.`;
        } else if (hasAutomation) {
          hook = `Having led automation initiatives that reduced processing time by 40% across 6,000+ transactions, I specialize in driving measurable efficiency gains.`;
        } else if (hasMba) {
          hook = `With an MBA and extensive business analysis experience, I bring strategic thinking combined with operational execution.`;
        } else {
          hook = `With proven expertise in business analysis and stakeholder management, I am confident I can contribute effectively to your team at ${company}.`;
        }

        // Construct full email
        const email = `Subject: ${position} Opportunity at ${company} – [Your Name]

Dear ${recipientName},

I hope this message finds you well. I am reaching out regarding the ${position} position at ${company}.

${hook} I have been following ${company}'s work in ${hasInsurance ? 'insurance technology' : 'digital transformation'} and am genuinely excited about the opportunity to contribute to your mission.

I would welcome the chance to schedule a brief 15-minute informational interview to learn more about your team's priorities and discuss how my background aligns with your needs. I am also happy to share my resume or portfolio for your review.

Thank you for your time and consideration. I look forward to the possibility of connecting.

Best regards,
[Your Name]
[LinkedIn Profile URL]
[Phone Number]`;

        // Render Results
        resultDiv.innerHTML = `
          <div class="result-card">
            <strong class="text-blue-700 block mb-3">📧 Your Networking Email</strong>
            <div class="mt-2 p-4 bg-white rounded-lg border whitespace-pre-wrap font-mono text-sm text-gray-800 leading-relaxed">${email}</div>
            <button onclick="copyEmail()" class="mt-4 px-4 py-2 bg-indigo-50 text-indigo-700 rounded-lg text-sm font-medium hover:bg-indigo-100 transition-colors">📋 Copy to Clipboard</button>
          </div>
          <div class="text-center text-xs text-gray-500 mt-6">💡 Tip: Customize the email with specific details about the company for best results!</div>
        `;

        window.emailText = email;
        generateBtn.disabled = false;
        generateBtn.innerHTML = '📧 Generate Networking Email';
      }, 1000);
    });

    window.copyEmail = () => { 
      navigator.clipboard.writeText(window.emailText).then(() => {
        alert('✅ Copied to clipboard!');
      }).catch(() => {
        alert('❌ Failed to copy. Please select and copy manually.');
      });
    };
  </script>
</body>
</html>
