<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Keyword Extractor - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FIX 1: Removed Google Generative AI CDN -->
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1000px; margin: 2rem auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-family: monospace; font-size: 0.85rem; transition: border-color 0.2s; }
    textarea:focus { outline: none; border-color: #667eea; }
    .result-card { background: #f8fafc; padding: 1.5rem; margin-top: 1rem; border-radius: 0.75rem; border-left: 4px solid #8b5cf6; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #e0e7ff; border-top: 3px solid #8b5cf6; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .keyword-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin: 4px; }
    .tag-red { background: #fee2e2; color: #991b1b; }
    .tag-purple { background: #e0e7ff; color: #3730a3; }
    .tag-green { background: #dcfce7; color: #166534; }
    .tag-blue { background: #dbeafe; color: #1e40af; }
    .tag-yellow { background: #fef9c3; color: #854d0e; }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <!-- FIX 2: Removed API Key Input Field Entirely -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🔑 AI Keyword Extractor</h1>
      <p class="text-gray-600 mt-2">Extract the most important keywords — Instant & Free</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline mt-2 inline-block">← Back to Portfolio</a>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-semibold mb-2 text-gray-700">💼 Job Description</label>
      <textarea id="jobdesc" rows="10" placeholder="Paste job description here..."></textarea>
    </div>

    <button id="extractBtn" class="btn">🔑 Extract Keywords</button>
    <div id="result" class="hidden"></div>
  </div>

  <script>
    const extractBtn = document.getElementById('extractBtn');
    const resultDiv = document.getElementById('result');

    // Comprehensive BA Keyword Bank for Categorization
    const keywordBank = {
      hardSkills: [
        "requirements gathering", "process mapping", "data analysis", "gap analysis", 
        "uat testing", "user stories", "workflow optimization", "kpi tracking", 
        "stakeholder management", "business case development", "agile methodology", 
        "scrum framework", "sprint planning", "backlog grooming", "sql", 
        "excel", "tableau", "power bi", "jira", "confluence", "visio", 
        "lucidchart", "guidewire", "salesforce", "sap", "oracle"
      ],
      softSkills: [
        "communication", "collaboration", "problem solving", "critical thinking", 
        "adaptability", "leadership", "teamwork", "negotiation", 
        "presentation skills", "active listening", "conflict resolution", 
        "time management", "analytical thinking", "attention to detail"
      ],
      tools: [
        "jira", "confluence", "trello", "asana", "monday.com", 
        "microsoft visio", "lucidchart", "draw.io", "figma", 
        "tableau", "power bi", "google analytics", "splunk", 
        "postman", "soapui", "git", "github", "slack", "teams"
      ],
      certifications: [
        "cbap", "ccba", "ecba", "csmp", "pmp", "capm", 
        "prince2", "scrum master", "csa", "csps", "sa", 
        "aws certified", "azure certified", "gcp certified", 
        "itil", "six sigma", "lean", "togaf"
      ]
    };

    // FIX 3: Replaced Real AI with Rule-Based Simulation
    extractBtn.addEventListener('click', () => {
      const jobdesc = document.getElementById('jobdesc').value.trim();

      if (!jobdesc) { 
        alert('Please paste a job description'); 
        return; 
      }

      // Simulate processing time
      extractBtn.disabled = true;
      extractBtn.innerHTML = '<span class="loading"></span> Extracting Keywords...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<div class="text-center py-8 text-gray-500"><div class="loading"></div> Analyzing job description...</div>';

      setTimeout(() => {
        const lowerJob = jobdesc.toLowerCase();
        
        // Extract matched keywords by category
        const results = {
          priorityKeywords: [],
          hardSkills: [],
          softSkills: [],
          tools: [],
          certifications: []
        };

        // Check each keyword bank against JD
        Object.keys(keywordBank).forEach(category => {
          keywordBank[category].forEach(kw => {
            if (lowerJob.includes(kw.toLowerCase())) {
              results[category].push(kw);
            }
          });
        });

        // Priority keywords = first 5 hard skills found (most critical for ATS)
        results.priorityKeywords = results.hardSkills.slice(0, 5);

        // Render Results
        resultDiv.innerHTML = `
          <div class="result-card">
            <strong class="text-purple-700 block mb-2">⭐ Priority Keywords (Must Include)</strong>
            <div class="flex flex-wrap gap-2">
              ${results.priorityKeywords.length ? results.priorityKeywords.map(k => `<span class="keyword-tag tag-red">${k}</span>`).join('') : '<span class="text-gray-500 text-sm">No priority keywords detected</span>'}
            </div>
          </div>
          
          <div class="result-card">
            <strong class="text-purple-700 block mb-2">️ Hard Skills & Technical Keywords</strong>
            <div class="flex flex-wrap gap-2">
              ${results.hardSkills.length ? results.hardSkills.map(k => `<span class="keyword-tag tag-purple">${k}</span>`).join('') : '<span class="text-gray-500 text-sm">No hard skills detected</span>'}
            </div>
          </div>
          
          <div class="result-card">
            <strong class="text-purple-700 block mb-2">🤝 Soft Skills</strong>
            <div class="flex flex-wrap gap-2">
              ${results.softSkills.length ? results.softSkills.map(k => `<span class="keyword-tag tag-green">${k}</span>`).join('') : '<span class="text-gray-500 text-sm">No soft skills detected</span>'}
            </div>
          </div>
          
          <div class="result-card">
            <strong class="text-purple-700 block mb-2">💻 Tools & Technologies</strong>
            <div class="flex flex-wrap gap-2">
              ${results.tools.length ? results.tools.map(k => `<span class="keyword-tag tag-blue">${k}</span>`).join('') : '<span class="text-gray-500 text-sm">No tools detected</span>'}
            </div>
          </div>
          
          <div class="result-card">
            <strong class="text-purple-700 block mb-2">📜 Certifications Required/Preferred</strong>
            <div class="flex flex-wrap gap-2">
              ${results.certifications.length ? results.certifications.map(k => `<span class="keyword-tag tag-yellow">${k}</span>`).join('') : '<span class="text-gray-500 text-sm">No certifications detected</span>'}
            </div>
          </div>
          
          <div class="text-center text-xs text-gray-500 mt-6">💡 Add these keywords to your resume to improve ATS score!</div>
        `;

        extractBtn.disabled = false;
        extractBtn.innerHTML = '🔑 Extract Keywords';
      }, 800);
    });
  </script>
</body>
</html>
