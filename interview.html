<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Interview Simulator - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FIX 1: Removed Google Generative AI CDN -->
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1200px; margin: 2rem auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; width: 100%; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-family: monospace; font-size: 0.85rem; transition: border-color 0.2s; }
    textarea:focus { outline: none; border-color: #667eea; }
    .question-box { background: #f0fdf4; padding: 1.5rem; border-radius: 1rem; margin: 1rem 0; border-left: 4px solid #22c55e; }
    .answer-box { background: #f8fafc; padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #e0e7ff; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <!-- FIX 2: Removed API Key Input Field Entirely -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🎤 AI Interview Simulator</h1>
      <p class="text-gray-600 mt-2">Practice Business Analyst interview questions — Instant & Free</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline mt-2 inline-block">← Back to Portfolio</a>
    </div>

    <div class="grid md:grid-cols-2 gap-6 mb-6">
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700"> Your Resume/CV</label>
        <textarea id="resume" placeholder="Paste your resume here..." rows="6"></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">💼 Job Description (Optional)</label>
        <textarea id="jobdesc" placeholder="Paste job description for role-specific questions..." rows="6"></textarea>
      </div>
    </div>

    <div class="flex gap-3 mb-6">
      <button id="startBtn" class="btn flex-1">🎯 Start Interview</button>
      <button id="nextBtn" class="btn flex-1 bg-gray-500" disabled>Next Question →</button>
    </div>

    <div id="interviewArea" class="hidden"></div>
  </div>

  <script>
    let currentQuestions = [];
    let currentIndex = 0;

    const startBtn = document.getElementById('startBtn');
    const nextBtn = document.getElementById('nextBtn');
    const interviewArea = document.getElementById('interviewArea');

    // Comprehensive BA Question Bank
    const questionBank = [
      "Tell me about a time you had to gather requirements from difficult stakeholders. How did you handle it?",
      "Describe a complex process you analyzed and improved. What was the impact?",
      "How do you prioritize conflicting requirements from different business units?",
      "Walk me through your experience with Agile/Scrum methodologies in a BA role.",
      "Give an example of how you used data analysis to drive a business decision.",
      "How do you ensure your documentation is clear and actionable for both technical and non-technical teams?",
      "Describe a time when a project scope changed mid-way. How did you adapt?",
      "What techniques do you use to validate that requirements are complete and testable?",
      "How have you handled a situation where the development team pushed back on a requirement?",
      "Explain a time you identified a risk early in a project. What mitigation steps did you take?"
    ];

    // Smart Feedback Templates based on answer length and keywords
    function generateFeedback(answer) {
      const lowerAnswer = answer.toLowerCase();
      let feedback = "";
      
      if (answer.length < 50) {
        feedback = "⚠️ This answer seems brief. Try expanding using the STAR method (Situation, Task, Action, Result) to provide more context.";
      } else if (!lowerAnswer.includes('i ') && !lowerAnswer.includes('my ')) {
        feedback = " Tip: Make sure to use first-person language ('I led', 'My approach') to clearly demonstrate your personal contribution.";
      } else if (lowerAnswer.includes('result') || lowerAnswer.includes('impact') || /\d+%|\$\d+/.test(lowerAnswer)) {
        feedback = "✅ Excellent! You included quantifiable results. This makes your answer much more compelling to hiring managers.";
      } else {
        feedback = " Good structure. To make this even stronger, try adding specific metrics or outcomes to quantify your impact.";
      }
      
      return feedback;
    }

    // FIX 3: Replaced Real AI with Rule-Based Simulation
    startBtn.addEventListener('click', () => {
      const resume = document.getElementById('resume').value.trim();
      
      if (!resume) { 
        alert('Please paste your resume'); 
        return; 
      }

      // Simulate processing time
      startBtn.disabled = true;
      startBtn.innerHTML = '<span class="loading"></span> Generating Questions...';
      interviewArea.classList.remove('hidden');
      interviewArea.innerHTML = '<div class="text-center py-8 text-gray-500"><div class="loading"></div> Preparing your interview session...</div>';

      setTimeout(() => {
        // Select 5 random unique questions
        const shuffled = [...questionBank].sort(() => 0.5 - Math.random());
        currentQuestions = shuffled.slice(0, 5);
        currentIndex = 0;
        
        displayQuestion();
        startBtn.disabled = true;
        nextBtn.disabled = false;
      }, 1000);
    });

    function displayQuestion() {
      interviewArea.innerHTML = `
        <div class="question-box">
          <div class="text-sm text-green-600 font-semibold mb-2">Question ${currentIndex + 1} of ${currentQuestions.length}</div>
          <div class="text-lg font-semibold">${currentQuestions[currentIndex]}</div>
        </div>
        <div class="answer-box">
          <label class="block font-semibold mb-2">✍️ Your Answer:</label>
          <textarea id="userAnswer" rows="4" class="w-full p-2 border rounded-md" placeholder="Type your answer here..."></textarea>
          <button onclick="submitAnswer()" class="mt-3 bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition-colors">Submit Answer →</button>
        </div>
        <div id="feedbackArea" class="mt-4"></div>
      `;
    }

    window.submitAnswer = () => {
      const answer = document.getElementById('userAnswer').value.trim();
      if (!answer) { 
        alert('Please type your answer'); 
        return; 
      }

      const feedbackArea = document.getElementById('feedbackArea');
      feedbackArea.innerHTML = '<div class="loading"></div> Analyzing your answer...';

      // Simulate analysis delay
      setTimeout(() => {
        const feedback = generateFeedback(answer);
        
        feedbackArea.innerHTML = `
          <div class="bg-blue-50 p-3 rounded-lg mt-2 border-l-4 border-blue-500">
            <strong class="text-blue-700">💡 AI Feedback:</strong>
            <p class="mt-1 text-gray-700">${feedback}</p>
          </div>
        `;
      }, 800);
    };

    nextBtn.addEventListener('click', () => {
      if (currentIndex + 1 < currentQuestions.length) {
        currentIndex++;
        displayQuestion();
      } else {
        interviewArea.innerHTML = `
          <div class="bg-green-50 p-6 rounded-lg text-center border-l-4 border-green-500">
            <div class="text-4xl mb-3">🎉</div>
            <h3 class="text-xl font-bold">Interview Complete!</h3>
            <p class="mt-2 text-gray-700">Great job practicing! Review the questions you struggled with and try again.</p>
            <button onclick="location.reload()" class="mt-4 bg-indigo-600 text-white px-6 py-2 rounded-md hover:bg-indigo-700 transition-colors">Start New Interview</button>
          </div>
        `;
        nextBtn.disabled = true;
      }
    });
  </script>
</body>
</html>
