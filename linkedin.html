<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI LinkedIn Optimizer - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FIX 1: Removed Google Generative AI CDN -->
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1000px; margin: 2rem auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .btn { background: linear-gradient(135deg, #0077b5, #00a0dc); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 119, 181, 0.3); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    textarea, input, select { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; transition: border-color 0.2s; }
    textarea:focus, input:focus, select:focus { outline: none; border-color: #0077b5; }
    .result-card { background: #f8fafc; padding: 1.5rem; margin-top: 1rem; border-radius: 0.75rem; border-left: 4px solid #0077b5; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #e0f2fe; border-top: 3px solid #0077b5; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <!-- FIX 2: Removed API Key Input Field Entirely -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-[#0077b5] to-[#00a0dc] bg-clip-text text-transparent">🔗 AI LinkedIn Optimizer</h1>
      <p class="text-gray-600 mt-2">Generate an optimized LinkedIn profile — Instant & Free</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline mt-2 inline-block">← Back to Portfolio</a>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-semibold mb-2 text-gray-700">📄 Your Resume/CV</label>
      <textarea id="resume" rows="8" placeholder="Paste your resume here..."></textarea>
    </div>

    <div class="grid md:grid-cols-2 gap-6 mb-6">
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">🎯 Target Role</label>
        <input type="text" id="role" value="Business Analyst" placeholder="Business Analyst">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-700">📍 Target Location</label>
        <select id="location">
          <option value="Luxembourg">🇱🇺 Luxembourg</option>
          <option value="Netherlands">🇳 Netherlands</option>
          <option value="Ireland">🇮🇪 Ireland</option>
          <option value="Remote EU"> Remote EU</option>
        </select>
      </div>
    </div>

    <button id="optimizeBtn" class="btn"> Generate Optimized Profile</button>
    <div id="result" class="hidden"></div>
  </div>

  <script>
    const optimizeBtn = document.getElementById('optimizeBtn');
    const resultDiv = document.getElementById('result');

    // Comprehensive BA Skill Bank
    const skillBank = [
      "Requirements Gathering", "Stakeholder Management", "Process Mapping", 
      "Agile Methodologies", "Scrum Framework", "User Stories", "Gap Analysis",
      "UAT Testing", "Data Analysis", "SQL", "KPI Tracking", "Workflow Optimization",
      "Business Case Development", "Guidewire", "Insurance Operations",
      "BFSI Domain", "JIRA", "Confluence", "Tableau", "Power BI"
    ];

    // FIX 3: Replaced Real AI with Rule-Based Simulation
    optimizeBtn.addEventListener('click', () => {
      const resume = document.getElementById('resume').value.trim();
      const role = document.getElementById('role').value.trim() || 'Business Analyst';
      const location = document.getElementById('location').value;

      if (!resume) { 
        alert('Please paste your resume'); 
        return; 
      }

      // Simulate processing time
      optimizeBtn.disabled = true;
      optimizeBtn.innerHTML = '<span class="loading"></span> Generating LinkedIn Profile...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<div class="text-center py-8 text-gray-500"><div class="loading"></div> Optimizing your profile...</div>';

      setTimeout(() => {
        const lowerResume = resume.toLowerCase();
        
        // Detect key attributes
        const hasGuidewire = lowerResume.includes('guidewire');
        const hasInsurance = lowerResume.includes('insurance') || lowerResume.includes('claims');
        const hasMba = lowerResume.includes('mba');
        const hasAutomation = lowerResume.includes('automation') || lowerResume.includes('40%');
        const hasAgile = lowerResume.includes('agile') || lowerResume.includes('scrum');
        
        // Generate Headline
        let headlineParts = [role];
        if (hasGuidewire) headlineParts.push("Guidewire Specialist");
        if (hasInsurance) headlineParts.push("Insurance Operations");
        if (hasAutomation) headlineParts.push("Process Automation Expert");
        if (hasMba) headlineParts.push("MBA");
        headlineParts.push(location);
        let headline = headlineParts.join(" | ");
        if (headline.length > 220) headline = headline.substring(0, 217) + "...";

        // Generate About Section
        let aboutIntro = hasMba 
          ? `Results-driven ${role} with an MBA and extensive experience in insurance operations.` 
          : `Dedicated ${role} with proven expertise in insurance operations and process improvement.`;
          
        let aboutBody = "";
        if (hasGuidewire) aboutBody += " Specialized in Guidewire implementations and claims center optimization.";
        if (hasAutomation) aboutBody += " Led automation initiatives achieving 40% efficiency gains across 6,000+ transactions while maintaining 99.2% accuracy.";
        if (hasAgile) aboutBody += " Experienced in Agile/Scrum methodologies, stakeholder management, and requirements gathering.";
        if (!aboutBody) aboutBody = " Skilled in requirements gathering, stakeholder management, data analysis, and delivering measurable business value through strategic process improvements.";
        
        let aboutClosing = ` Open to opportunities in ${location}.`;
        let about = `${aboutIntro}${aboutBody}${aboutClosing}`;

        // Select Top Skills (max 10)
        const matchedSkills = [];
        skillBank.forEach(skill => {
          if (lowerResume.includes(skill.toLowerCase())) matchedSkills.push(skill);
        });
        // Add core skills if missing
        const coreSkills = ["Requirements Gathering", "Stakeholder Management", "Agile Methodologies"];
        coreSkills.forEach(s => { if (!matchedSkills.includes(s)) matchedSkills.push(s); });
        const topSkills = matchedSkills.slice(0, 10);

        // Generate Custom URL Suggestion
        const cleanRole = role.replace(/\s+/g, '').toLowerCase();
        const customUrl = `pr-swaminathan-${cleanRole}-${location.toLowerCase().replace(/\s+/g, '-')}`;

        // Generate Open To Work Headline
        const openToWork = `${role} | ${hasGuidewire ? 'Guidewire' : 'Insurance Ops'} | ${location} | Available Immediately`;

        // Render Results
        resultDiv.innerHTML = `
          <div class="result-card">
            <strong class="text-blue-700 block mb-2">💼 LinkedIn Headline</strong>
            <div class="mt-2 p-3 bg-white rounded border text-gray-800">${headline}</div>
            <button onclick="copyText(this)" class="mt-2 text-sm text-indigo-600 hover:text-indigo-800 font-medium">📋 Copy Headline</button>
          </div>
          
          <div class="result-card">
            <strong class="text-blue-700 block mb-2">📝 About Section</strong>
            <div class="mt-2 p-3 bg-white rounded border whitespace-pre-wrap text-gray-800 leading-relaxed">${about}</div>
            <button onclick="copyText(this)" class="mt-2 text-sm text-indigo-600 hover:text-indigo-800 font-medium">📋 Copy About</button>
          </div>
          
          <div class="result-card">
            <strong class="text-blue-700 block mb-2"> Top Skills (Add to LinkedIn)</strong>
            <div class="flex flex-wrap gap-2 mt-2">
              ${topSkills.map(s => `<span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium">${s}</span>`).join('')}
            </div>
          </div>
          
          <div class="result-card">
            <strong class="text-blue-700 block mb-2">🔗 Suggested Custom URL</strong>
            <div class="mt-2 text-gray-800">linkedin.com/in/<strong>${customUrl}</strong></div>
          </div>
          
          <div class="result-card">
            <strong class="text-blue-700 block mb-2">🎯 Open To Work Headline</strong>
            <div class="mt-2 text-gray-800">${openToWork}</div>
          </div>
          
          <div class="text-center text-xs text-gray-500 mt-6">💡 Tip: Update these sections to improve recruiter visibility by up to 40x!</div>
        `;

        optimizeBtn.disabled = false;
        optimizeBtn.innerHTML = '🔗 Generate Optimized Profile';
      }, 1000);
    });

    window.copyText = (btn) => { 
      const text = btn.previousElementSibling.innerText;
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerText;
        btn.innerText = '✅ Copied!';
        setTimeout(() => btn.innerText = original, 2000);
      }).catch(() => {
        alert('❌ Failed to copy. Please select and copy manually.');
      });
    };
  </script>
</body>
</html>
