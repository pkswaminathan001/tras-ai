<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI LinkedIn Optimizer - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.21.0/dist/index.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1000px; margin: 2rem auto; }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; }
    .btn:disabled { opacity: 0.5; }
    .result-card { background: #f8fafc; padding: 1rem; margin: 0.75rem 0; border-radius: 0.5rem; border-left: 4px solid #0077b5; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #0077b5; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .api-input { background: #fef9c3; border: 1px solid #eab308; }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-[#0077b5] to-[#00a0dc] bg-clip-text text-transparent">🔗 AI LinkedIn Optimizer</h1>
      <p class="text-gray-600">Generate an optimized LinkedIn profile for BA roles</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline">← Back to Portfolio</a>
    </div>

    <div class="mb-4 p-3 bg-amber-50 rounded-lg border border-amber-200">
      <label class="block text-sm font-semibold mb-1">🔑 Google Gemini API Key</label>
      <input type="password" id="apiKey" class="w-full p-2 border rounded-md api-input">
    </div>

    <div class="mb-4">
      <label class="block text-sm font-semibold mb-1">📄 Your Resume/CV</label>
      <textarea id="resume" rows="8" placeholder="Paste your resume here..."></textarea>
    </div>

    <div class="grid md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-semibold mb-1">🎯 Target Role</label>
        <input type="text" id="role" class="w-full p-2 border rounded-md" placeholder="Business Analyst">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">📍 Target Location</label>
        <select id="location" class="w-full p-2 border rounded-md">
          <option value="Luxembourg">🇱🇺 Luxembourg</option>
          <option value="Netherlands">🇳🇱 Netherlands</option>
          <option value="Ireland">🇮🇪 Ireland</option>
          <option value="Remote EU">🌍 Remote EU</option>
        </select>
      </div>
    </div>

    <button id="optimizeBtn" class="btn">🔗 Generate Optimized Profile</button>
    <div id="result" class="mt-6 hidden"></div>
  </div>

  <script>
    const optimizeBtn = document.getElementById('optimizeBtn');
    const resultDiv = document.getElementById('result');
    const apiKeyInput = document.getElementById('apiKey');

    if (localStorage.getItem('gemini_api_key')) apiKeyInput.value = localStorage.getItem('gemini_api_key');
    apiKeyInput.addEventListener('change', () => { if(apiKeyInput.value.trim()) localStorage.setItem('gemini_api_key', apiKeyInput.value.trim()); });

    optimizeBtn.addEventListener('click', async () => {
      const resume = document.getElementById('resume').value.trim();
      const role = document.getElementById('role').value.trim();
      const location = document.getElementById('location').value;
      const apiKey = apiKeyInput.value.trim();

      if (!resume) { alert('Please paste your resume'); return; }
      if (!apiKey) { alert('Enter your Gemini API key'); return; }

      optimizeBtn.disabled = true;
      optimizeBtn.innerHTML = '<span class="loading"></span> Generating LinkedIn Profile...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<div class="text-center py-8"><div class="loading"></div> AI optimizing your profile...</div>';

      try {
        const { GoogleGenerativeAI } = window;
        const genAI = new GoogleGenerativeAI(apiKey);
        const model = genAI.getGenerativeModel({ model: 'gemini-2.0-flash' });

        const prompt = `Create an optimized LinkedIn profile for a ${role} in ${location}.

RESUME: ${resume}

Return ONLY JSON:
{
  "headline": "Attention-grabbing headline (max 220 characters)",
  "about": "Compelling About section (3-4 paragraphs)",
  "skills": ["Skill 1", "Skill 2", "Skill 3", "Skill 4", "Skill 5", "Skill 6", "Skill 7", "Skill 8", "Skill 9", "Skill 10"],
  "customUrl": "suggested-custom-url-slug",
  "openToWork": "Suggested Open To Work headline"
}`;

        const result = await model.generateContent(prompt);
        const response = await result.response;
        let text = response.text().replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
        const data = JSON.parse(text);

        resultDiv.innerHTML = `
          <div class="result-card">
            <strong class="text-blue-700">💼 LinkedIn Headline</strong>
            <div class="mt-2 p-3 bg-white rounded border">${data.headline}</div>
            <button onclick="copyText('${data.headline.replace(/'/g, "\\'")}')" class="mt-2 text-sm text-indigo-600">📋 Copy Headline</button>
          </div>
          <div class="result-card">
            <strong class="text-blue-700">📝 About Section</strong>
            <div class="mt-2 p-3 bg-white rounded border whitespace-pre-wrap">${data.about}</div>
            <button onclick="copyText('${data.about.replace(/'/g, "\\'")}')" class="mt-2 text-sm text-indigo-600">📋 Copy About</button>
          </div>
          <div class="result-card">
            <strong class="text-blue-700">🔧 Top Skills (Add to LinkedIn)</strong>
            <div class="flex flex-wrap gap-2 mt-2">${data.skills.map(s => `<span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm">${s}</span>`).join('')}</div>
          </div>
          <div class="result-card">
            <strong class="text-blue-700">🔗 Suggested Custom URL</strong>
            <div class="mt-2">linkedin.com/in/<strong>${data.customUrl}</strong></div>
          </div>
          <div class="result-card">
            <strong class="text-blue-700">🎯 Open To Work Headline</strong>
            <div class="mt-2">${data.openToWork}</div>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `<div class="result-card bg-red-50"><strong>Error:</strong> ${error.message}</div>`;
      } finally {
        optimizeBtn.disabled = false;
        optimizeBtn.innerHTML = '🔗 Generate Optimized Profile';
      }
    });

    window.copyText = (text) => { navigator.clipboard.writeText(text); alert('✅ Copied to clipboard!'); };
  </script>
</body>
</html>
