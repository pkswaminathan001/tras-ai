<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Job Match Predictor - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.21.0/dist/index.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1000px; margin: 2rem auto; }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; }
    .btn:disabled { opacity: 0.5; }
    .result-card { background: #f8fafc; padding: 1rem; margin: 0.75rem 0; border-radius: 0.5rem; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .api-input { background: #fef9c3; border: 1px solid #eab308; }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🔮 AI Job Match Predictor</h1>
      <p class="text-gray-600">Will you get an interview? AI predicts your chances</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline">← Back to Portfolio</a>
    </div>

    <div class="mb-4 p-3 bg-amber-50 rounded-lg border border-amber-200">
      <label class="block text-sm font-semibold mb-1">🔑 Google Gemini API Key</label>
      <input type="password" id="apiKey" class="w-full p-2 border rounded-md api-input">
    </div>

    <div class="grid md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-semibold mb-1">📄 Your Resume</label>
        <textarea id="resume" rows="8" placeholder="Paste your resume here..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">💼 Job Description</label>
        <textarea id="jobdesc" rows="8" placeholder="Paste job description here..."></textarea>
      </div>
    </div>

    <button id="predictBtn" class="btn">🔮 Predict Interview Chance</button>
    <div id="result" class="mt-6 hidden"></div>
  </div>

  <script>
    const predictBtn = document.getElementById('predictBtn');
    const resultDiv = document.getElementById('result');
    const apiKeyInput = document.getElementById('apiKey');

    if (localStorage.getItem('gemini_api_key')) apiKeyInput.value = localStorage.getItem('gemini_api_key');
    apiKeyInput.addEventListener('change', () => { if(apiKeyInput.value.trim()) localStorage.setItem('gemini_api_key', apiKeyInput.value.trim()); });

    predictBtn.addEventListener('click', async () => {
      const resume = document.getElementById('resume').value.trim();
      const job = document.getElementById('jobdesc').value.trim();
      const apiKey = apiKeyInput.value.trim();

      if (!resume || !job) { alert('Please paste both resume and job description'); return; }
      if (!apiKey) { alert('Enter your Gemini API key'); return; }

      predictBtn.disabled = true;
      predictBtn.innerHTML = '<span class="loading"></span> Analyzing Match...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<div class="text-center py-8"><div class="loading"></div> AI predicting your chances...</div>';

      try {
        const { GoogleGenerativeAI } = window;
        const genAI = new GoogleGenerativeAI(apiKey);
        const model = genAI.getGenerativeModel({ model: 'gemini-2.0-flash' });

        const prompt = `Predict interview chances for this candidate.

RESUME: ${resume}
JOB: ${job}

Return ONLY JSON:
{
  "matchPercentage": 78,
  "interviewLikelihood": "High/Medium/Low",
  "reasoning": "Why this score",
  "strengths": ["Strength 1", "Strength 2"],
  "weaknesses": ["Weakness 1", "Weakness 2"],
  "actionItems": ["Action 1", "Action 2", "Action 3"]
}`;

        const result = await model.generateContent(prompt);
        const response = await result.response;
        let text = response.text().replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
        const data = JSON.parse(text);

        const color = data.matchPercentage >= 70 ? 'text-green-600' : data.matchPercentage >= 50 ? 'text-yellow-600' : 'text-red-600';
        const emoji = data.matchPercentage >= 70 ? '🎉' : data.matchPercentage >= 50 ? '📋' : '⚠️';

        resultDiv.innerHTML = `
          <div class="text-center mb-4">
            <div class="text-6xl font-bold ${color}">${data.matchPercentage}<span class="text-2xl">%</span></div>
            <div class="text-xl mt-1">${emoji} ${data.interviewLikelihood} Chance of Interview</div>
          </div>
          <div class="result-card"><strong>📊 AI Reasoning:</strong><br>${data.reasoning}</div>
          <div class="result-card"><strong class="text-green-700">✅ Your Advantages</strong><br>${data.strengths.map(s => `• ${s}`).join('<br>')}</div>
          <div class="result-card"><strong class="text-red-700">⚠️ Areas to Improve</strong><br>${data.weaknesses.map(w => `• ${w}`).join('<br>')}</div>
          <div class="result-card"><strong class="text-blue-700">📌 Action Items to Increase Chances</strong><br>${data.actionItems.map(a => `• ${a}`).join('<br>')}</div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `<div class="result-card bg-red-50"><strong>Error:</strong> ${error.message}</div>`;
      } finally {
        predictBtn.disabled = false;
        predictBtn.innerHTML = '🔮 Predict Interview Chance';
      }
    });
  </script>
</body>
</html>
