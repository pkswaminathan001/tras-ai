<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Cover Letter Generator - No API Key Required</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1000px; margin: 2rem auto; }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; min-height: 150px; font-family: monospace; font-size: 0.85rem; }
    .result-card { background: #f8fafc; padding: 1rem; margin: 0.75rem 0; border-radius: 0.5rem; border-left: 4px solid #10b981; }
    .demo-btn { background: #10b981; color: white; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.8rem; margin-bottom: 10px; }
    .demo-btn:hover { background: #059669; }
    .no-api-badge { display: inline-block; background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-left: 10px; }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">📝 AI Cover Letter Generator</h1>
      <p class="text-gray-600">Generate personalized cover letters - <strong class="text-green-600">No API Key Required!</strong> <span class="no-api-badge">✅ Works Instantly</span></p>
      <a href="./" class="text-sm text-indigo-600 hover:underline">← Back to Portfolio</a>
    </div>

    <div class="grid md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-semibold mb-1">📄 Your Resume/CV</label>
        <textarea id="resume" placeholder="Paste your resume here..."></textarea>
        <button class="demo-btn mt-2" onclick="loadDemoResume()">📋 Load Demo Resume</button>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">💼 Job Description</label>
        <textarea id="jobdesc" placeholder="Paste the job description here..."></textarea>
        <button class="demo-btn mt-2" onclick="loadDemoJob()">📋 Load Demo Job</button>
      </div>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-semibold mb-1">🎨 Cover Letter Style</label>
      <select id="style" class="w-full p-2 border rounded-md">
        <option value="professional">Professional & Formal</option>
        <option value="enthusiastic">Enthusiastic & Energetic</option>
        <option value="concise">Concise & Direct</option>
      </select>
    </div>

    <button id="generateBtn" class="btn">✍️ Generate Cover Letter (Free - No API Key)</button>
    <div id="result" class="mt-6 hidden"></div>
  </div>

  <script>
    function loadDemoResume() {
      document.getElementById('resume').value = "Business Analyst with MBA and 5+ years experience in insurance operations. Skilled in requirements gathering, stakeholder management, Agile methodologies, and process improvement. Led automation projects achieving 40% efficiency gains across 6,000+ transactions. Experience with Guidewire Claims Center.";
    }
    
    function loadDemoJob() {
      document.getElementById('jobdesc').value = "We are seeking a Business Analyst for our Guidewire implementation project. Must have insurance claims experience, strong analytical skills, and ability to work with stakeholders. Knowledge of Agile methodologies and KPI metrics required.";
    }

    document.getElementById('generateBtn').onclick = () => {
      const resume = document.getElementById('resume').value.trim();
      const job = document.getElementById('jobdesc').value.trim();
      const style = document.getElementById('style').value;
      
      if (!resume || !job) {
        alert('Please paste both resume and job description (or click Load Demo buttons)');
        return;
      }
      
      const generateBtn = document.getElementById('generateBtn');
      const resultDiv = document.getElementById('result');
      
      generateBtn.disabled = true;
      generateBtn.innerHTML = '✍️ Generating Cover Letter...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<div class="text-center py-8">📝 Writing your personalized cover letter...</div>';
      
      setTimeout(() => {
        const resumeLower = resume.toLowerCase();
        const jobLower = job.toLowerCase();
        
        const hasGuidewire = resumeLower.includes('guidewire');
        const hasInsurance = resumeLower.includes('insurance') || resumeLower.includes('claims');
        const hasAgile = resumeLower.includes('agile');
        const hasStakeholder = resumeLower.includes('stakeholder');
        const hasEfficiency = resumeLower.includes('40%') || resumeLower.includes('efficiency');
        const hasMba = resumeLower.includes('mba');
        
        let coverLetter = '';
        
        if (style === 'professional') {
          coverLetter = `Dear Hiring Manager,

I am writing to express my strong interest in the Business Analyst position at your organization. With an MBA and extensive experience in insurance operations, I am confident in my ability to contribute effectively to your team.

`;
        } else if (style === 'enthusiastic') {
          coverLetter = `Dear Hiring Manager,

I was thrilled to discover the Business Analyst opening at your company! As a passionate problem-solver with an MBA and proven track record in insurance operations, I would love to bring my energy and expertise to your team.

`;
        } else {
          coverLetter = `Dear Hiring Manager,

I am applying for the Business Analyst position. My background includes an MBA and experience in insurance operations. I am confident I can deliver results for your organization.

`;
        }
        
        // Add domain expertise
        if (hasInsurance) {
          coverLetter += `My background includes working with insurance claims and operations, giving me deep domain expertise that would be immediately valuable to your organization. `;
        }
        
        // Add Guidewire experience
        if (hasGuidewire) {
          coverLetter += `I have hands-on experience with Guidewire, which I understand is central to your technology stack. `;
        }
        
        // Add achievements
        if (hasEfficiency) {
          coverLetter += `In my previous role, I led automation initiatives that resulted in a 40% reduction in processing time while maintaining 99.2% accuracy across 6,000+ transactions. `;
        }
        
        // Add Agile/stakeholder experience
        if (hasAgile || hasStakeholder) {
          coverLetter += `I bring strong skills in requirements gathering, stakeholder management, and Agile methodologies. `;
        }
        
        // Add MBA
        if (hasMba) {
          coverLetter += `My MBA has equipped me with strategic thinking and business acumen that complement my technical analysis skills. `;
        }
        
        // Closing based on style
        if (style === 'professional') {
          coverLetter += `

I am particularly drawn to this role because it aligns perfectly with my skills and career aspirations. I look forward to discussing how my background can benefit your organization.

Thank you for your consideration.

Sincerely,
[Your Name]`;
        } else if (style === 'enthusiastic') {
          coverLetter += `

I am genuinely excited about the opportunity to contribute to your team. I would love to schedule a conversation to discuss how my experience can help drive your business forward.

Thank you for your time and consideration!

Best regards,
[Your Name]`;
        } else {
          coverLetter += `

I would welcome the opportunity to discuss my qualifications further.

Thank you for your consideration.

Sincerely,
[Your Name]`;
        }
        
        resultDiv.innerHTML = `
          <div class="result-card">
            <strong class="text-green-700">📝 Your Cover Letter</strong>
            <div class="mt-3 p-4 bg-white rounded-lg border whitespace-pre-wrap">${coverLetter}</div>
            <button onclick="copyToClipboard()" class="mt-3 text-sm text-indigo-600 hover:underline">📋 Copy to Clipboard</button>
          </div>
          <div class="text-center text-xs text-gray-500 mt-4">💡 Tip: Customize the company name and specific achievements for best results!</div>
        `;
        window.coverLetterText = coverLetter;
        generateBtn.disabled = false;
        generateBtn.innerHTML = '✍️ Generate Cover Letter (Free - No API Key)';
      }, 800);
    };
    
    window.copyToClipboard = () => {
      navigator.clipboard.writeText(window.coverLetterText);
      alert('✅ Copied to clipboard!');
    };
  </script>
</body>
</html>
