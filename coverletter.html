<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Cover Letter Generator - TRAS AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.21.0/dist/index.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 1200px; margin: 2rem auto; }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 700; cursor: pointer; border: none; width: 100%; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; min-height: 150px; font-family: monospace; font-size: 0.85rem; }
    .result-card { background: #f8fafc; padding: 1rem; margin: 0.75rem 0; border-radius: 0.5rem; border-left: 4px solid #667eea; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .api-input { background: #fef9c3; border: 1px solid #eab308; }
  </style>
</head>
<body class="p-4">
  <div class="card">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">📝 AI Cover Letter Generator</h1>
      <p class="text-gray-600">Generate personalized cover letters tailored to any job description</p>
      <a href="./" class="text-sm text-indigo-600 hover:underline">← Back to Portfolio</a>
    </div>

    <div class="mb-4 p-3 bg-amber-50 rounded-lg border border-amber-200">
      <label class="block text-sm font-semibold mb-1">🔑 Google Gemini API Key</label>
      <input type="password" id="apiKey" class="w-full p-2 border rounded-md api-input" placeholder="Get free key from aistudio.google.com">
      <p class="text-xs text-gray-500 mt-1">Free tier: 60 requests/minute. Your key stays in your browser.</p>
    </div>

    <div class="grid md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-semibold mb-1">📄 Your Resume/CV</label>
        <textarea id="resume" placeholder="Paste your resume here..."></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">💼 Job Description</label>
        <textarea id="jobdesc" placeholder="Paste the job description here..."></textarea>
      </div>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-semibold mb-1">🎨 Cover Letter Style</label>
      <select id="style" class="w-full p-2 border rounded-md">
        <option value="professional">Professional & Formal</option>
        <option value="enthusiastic">Enthusiastic & Energetic</option>
        <option value="concise">Concise & Direct</option>
        <option value="storytelling">Storytelling & Narrative</option>
      </select>
    </div>

    <button id="generateBtn" class="btn">✍️ Generate Cover Letter</button>
    <div id="result" class="mt-6 hidden"></div>
  </div>

  <script>
    const generateBtn = document.getElementById('generateBtn');
    const resultDiv = document.getElementById('result');
    const apiKeyInput = document.getElementById('apiKey');

    if (localStorage.getItem('gemini_api_key')) apiKeyInput.value = localStorage.getItem('gemini_api_key');
    apiKeyInput.addEventListener('change', () => { if(apiKeyInput.value.trim()) localStorage.setItem('gemini_api_key', apiKeyInput.value.trim()); });

    generateBtn.addEventListener('click', async () => {
      const resume = document.getElementById('resume').value.trim();
      const job = document.getElementById('jobdesc').value.trim();
      const style = document.getElementById('style').value;
      const apiKey = apiKeyInput.value.trim();

      if (!resume || !job) { alert('Please paste both resume and job description'); return; }
      if (!apiKey) { alert('Get your free Gemini API key from aistudio.google.com'); return; }

      generateBtn.disabled = true;
      generateBtn.innerHTML = '<span class="loading"></span> AI Writing Cover Letter...';
      resultDiv.innerHTML = '<div class="text-center py-8"><div class="loading"></div> AI is crafting your cover letter...</div>';
      resultDiv.classList.remove('hidden');

      try {
        const { GoogleGenerativeAI } = window;
        const genAI = new GoogleGenerativeAI(apiKey);
        const model = genAI.getGenerativeModel({ model: 'gemini-2.0-flash' });

        const prompt = `You are an expert cover letter writer for Business Analyst roles in Luxembourg, Netherlands, and Ireland.

RESUME:
${resume}

JOB DESCRIPTION:
${job}

STYLE: ${style}

Write a professional cover letter that:
1. Is 3-4 paragraphs
2. Highlights relevant experience from resume
3. Connects skills to job requirements
4. Shows enthusiasm for the role and company
5. Includes a call to action for interview

Return ONLY the cover letter text, no explanations.`;

        const result = await model.generateContent(prompt);
        const response = await result.response;
        let coverLetter = response.text();

        resultDiv.innerHTML = `
          <div class="result-card">
            <strong class="text-green-700">📝 Your AI-Generated Cover Letter</strong>
            <div class="mt-3 p-4 bg-white rounded-lg border whitespace-pre-wrap">${coverLetter}</div>
            <button onclick="copyToClipboard()" class="mt-3 text-sm text-indigo-600 hover:underline">📋 Copy to Clipboard</button>
          </div>
          <div class="text-center text-xs text-gray-500 mt-4">💡 Tip: Customize the company name and specific achievements for best results!</div>
        `;

        window.coverLetterText = coverLetter;
      } catch (error) {
        resultDiv.innerHTML = `<div class="result-card bg-red-50 border-l-red-500"><strong>❌ Error:</strong> ${error.message}</div>`;
      } finally {
        generateBtn.disabled = false;
        generateBtn.innerHTML = '✍️ Generate Cover Letter';
      }
    });

    window.copyToClipboard = () => { navigator.clipboard.writeText(window.coverLetterText); alert('✅ Copied to clipboard!'); };
  </script>
</body>
</html>
